name: techarrow-frontend-dev

# Hot-reload setup. Source is bind-mounted over the image; node_modules and
# the .next cache live in named volumes so the bind mount doesn't shadow them.

services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    image: techarrow/web:dev
    container_name: techarrow-web-dev
    init: true
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      # Polling fallback for filesystems without inotify (Docker Desktop, WSL, …).
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    image: techarrow/admin:dev
    container_name: techarrow-admin-dev
    init: true
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    volumes:
      - ./admin:/app
      - admin_node_modules:/app/node_modules
      - admin_next_cache:/app/.next

volumes:
  web_node_modules:
  admin_node_modules:
  web_next_cache:
  admin_next_cache:
