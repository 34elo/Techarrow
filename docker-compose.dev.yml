services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - ./web:/app
      - /app/node_modules

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile.dev
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: "true"
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    volumes:
      - ./admin:/app
      - /app/node_modules
