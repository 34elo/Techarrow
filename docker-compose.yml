services:
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "${ADMIN_PORT:-3001}:3000"
    restart: unless-stopped
